<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ear Ring Log</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body { margin:0; background:#120F1B; color:#eee; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; }
  .wrap { max-width:640px; margin:0 auto; padding:96px 24px; text-align:center; }
  h1 { font-size:2.4rem; color:#8A6FDF; margin-bottom:0.5rem; }
  p.tagline { font-size:1.15rem; color:#ccc; margin-bottom:2.5rem; }
  .feature { background:rgba(255,255,255,0.05); border-radius:14px; padding:20px; margin-bottom:14px; text-align:left; }
  .feature h3 { margin:0 0 6px 0; color:#8A6FDF; }
  footer { margin-top:60px; font-size:0.85rem; color:#888; }
  a { color:#8A6FDF; }

  @keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-40px) scale(1.08); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }
  .orb {
    position: fixed; top: -120px; right: -120px; width: 420px; height: 420px;
    background: radial-gradient(circle, #8A6FDF55 0%, #8A6FDF00 70%);
    filter: blur(10px); pointer-events: none; z-index: 0;
    animation: floatOrb 9s ease-in-out infinite;
  }
  .wrap { position: relative; z-index: 1; }
  h1 { animation: fadeUp 0.8s ease-out both; }
  p.tagline { animation: fadeUp 0.8s ease-out 0.15s both; }
  .feature { animation: fadeUp 0.8s ease-out both; transition: transform 0.25s ease; }
  .feature:nth-of-type(1) { animation-delay: 0.3s; }
  .feature:nth-of-type(2) { animation-delay: 0.45s; }
  .feature:hover { transform: translateY(-3px); }
  footer { animation: fadeUp 0.8s ease-out 0.6s both; }
</style>
</head>
<body>
<div class="orb"></div>
<div class="wrap">
  <h1>Ear Ring Log</h1>
  <p class="tagline">Tracks tinnitus flare-ups, loudness, and possible triggers like noise or caffeine.</p>
  <div class="feature">
    <h3>Free</h3>
    <p>Daily tinnitus loudness rating with trigger notes</p>
  </div>
  <div class="feature">
    <h3>Pro</h3>
    <p>Trigger correlation charts and long-term history export</p>
  </div>
  <footer>
    <p><a href="privacy.html">Privacy Policy</a> &middot; <a href="terms.html">Terms of Use</a></p>
    <p>Contact: s0533495227@gmail.com</p>
  </footer>
</div>
</body>
</html>
