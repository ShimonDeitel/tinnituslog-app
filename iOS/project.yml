name: EarRingLog
options:
  bundleIdPrefix: com.shimondeitel.tinnituslog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  EarRingLog:
    type: application
    platform: iOS
    sources:
      - path: EarRingLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.tinnituslog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: EarRingLog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  EarRingLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: EarRingLogTests
      - path: EarRingLog.storekit
    dependencies:
      - target: EarRingLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.tinnituslog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  EarRingLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: EarRingLogUITests
    dependencies:
      - target: EarRingLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.tinnituslog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  EarRingLog:
    build:
      targets:
        EarRingLog: all
        EarRingLogTests: [test]
        EarRingLogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: EarRingLog.storekit
    test:
      config: Debug
      storeKitConfiguration: EarRingLog.storekit
      targets:
        - EarRingLogTests
        - EarRingLogUITests
    archive:
      config: Release
